    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-shield"></i>
            <span>Admin Dashboard</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="add-timetable.html"><i class="fas fa-plus-circle"></i> Add Timetable</a></li>

            <li><a href="college-details.html"><i class="fas fa-building"></i> College Details</a></li>

        </ul>
    </nav>
    <main class="main-content">
        <header class="page-header">
            <h1>Add Slot Change</h1>
            <p>Approve or create changes.</p>
        </header>
        <div class="container">
            <form class="admin-form">
                <div class="form-group">
                    <label for="class">Class</label>
                    <select id="class" class="form-select">
                        <option>Math 101</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="old-slot">Old Slot</label>
                    <input type="text" id="old-slot">
                </div>
                <div class="form-group">
                    <label for="new-slot">New Slot</label>
                    <input type="text" id="new-slot">
                </div>
                <button type="submit" class="btn btn-primary">Apply Change</button>
            </form>
        </div>
    </main>
    <script src="../../js/shared.js"></script>
    <script>
        document.querySelector('.admin-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Slot change applied!');
        });
    </script>
</body>
</html>
