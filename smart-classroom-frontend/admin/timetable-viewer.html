    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .timetable-card { 
            border: 1px solid #ccc; 
            margin: 20px 0; 
            padding: 15px; 
            border-radius: 8px; 
            background: #f9f9f9;
        }
        .timetable-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .status { font-weight: bold; }
        .status.saved { color: green; }
        .status.edited { color: orange; }
        .status.updating { color: blue; }
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin: 10px 0; 
        }
        th, td { 
            border: 1px solid #ddd; 
            padding: 8px; 
            text-align: center; 
            vertical-align: top;
        }
        th { background: #e9e9e9; }
        input { 
            width: 100%; 
            border: 1px solid #007bff; 
            padding: 4px; 
            box-sizing: border-box;
            height: 60px; 
            resize: vertical;
        }
        .edit-mode td { background: #fff3cd; }
        .no-edit td { background: white; }
        .read-only-cell { font-size: 12px; white-space: pre-line; }
        button { 
            padding: 8px 12px; 
            margin: 5px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        .edit-btn { background: #28a745; color: white; }
        .save-btn { background: #ffc107; color: black; }
        .save-btn:disabled { background: #6c757d; color: white; cursor: not-allowed; }
        .update-all-btn { 
            background: #007bff; 
            color: white; 
            padding: 12px 24px; 
            font-size: 16px; 
            margin: 20px 0; 
        }
        .update-all-btn:disabled { background: #6c757d; cursor: not-allowed; }
        .loading { opacity: 0.6; }
        .error-msg { color: red; padding: 10px; background: #ffe6e6; border: 1px solid red; margin: 10px 0; }

        .main-content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <main class="main-content">
    <h1>Timetable Admin Dashboard</h1>
    <div id="error-container"></div>
    <div id="timetables-container"></div>
    <button id="update-all-btn" class="update-all-btn" disabled>Update All Timetables (0 changes)</button>
    <button onclick="publishTimetable('civil_engineering-2-A')">
  Publish to Students
</button>

    <div id="loading" style="display: none;">Loading...</div>
    </main>
    <script>
        // Global State
        let timetables = [];
        let editedMap = {};

        // DOM Elements
        const container = document.getElementById('timetables-container');
        const updateBtn = document.getElementById('update-all-btn');
        const loadingEl = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');

        // Fixed periods with times
        const PERIOD_TIMES = {
            'P1': '9:00 AM - 10:00 AM',
            'P2': '10:00 AM - 11:00 AM',
            'P3': '11:00 AM - 12:00 PM',
            'P4': '1:00 PM - 2:00 PM',
            'P5': '2:00 PM - 3:00 PM',
            'P6': '3:00 PM - 4:00 PM'
        };
        const FIXED_PERIODS = Object.keys(PERIOD_TIMES);

        // 🔥 NORMALIZE FUNCTION (handles "Fri-P1" keys from DB)
        function normalizeSchedule(rawSchedule) {
            const normalized = {};
            Object.entries(rawSchedule || {}).forEach(([key, value]) => {
                // Parse key = "Fri-P1" → day = "Fri", period = "P1"
                const [day, period] = key.split("-");
                if (!normalized[period]) normalized[period] = {};
                normalized[period][day] = `${value.subject || ""}\n${value.faculty || ""}`.trim();
            });
            return normalized;
        }

        // Show/Clear Error
        function showError(msg) {
            errorContainer.innerHTML = `<div class="error-msg">${msg}</div>`;
        }
        function clearError() {
            errorContainer.innerHTML = '';
        }

        // Fetch from MongoDB
        async function loadTimetables() {
            loadingEl.style.display = 'block';
            container.innerHTML = '';
            clearError();
            try {
                console.log('Fetching from http://localhost:8000/timetables...');
                const res = await fetch("http://localhost:8000/timetables");
                console.log('Full Response:', { status: res.status, statusText: res.statusText });
                if (!res.ok) {
                    const errText = await res.text();
                    console.error('Response body on error:', errText);
                    throw new Error(`HTTP ${res.status} ${res.statusText}: ${errText || 'No body'}`);
                }
                const data = await res.json();
                console.log('Raw JSON from DB:', data);
                timetables = data || [];
                if (timetables.length === 0) {
                    showError('No timetables found in MongoDB. Generate some first?');
                    return;
                }
                renderTimetables();
                updateButtonState();
            } catch (err) {
                console.error('Full error:', err);
                showError('Failed to load timetables from MongoDB: ' + err.message + '\nCheck console for details.');
                alert('Failed to load: ' + err.message + '\n(Backend logs? Route up?)');
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        // Render Cards (NORMALIZE HERE!)
        function renderTimetables() {
            container.innerHTML = '';
            timetables.forEach((tt, index) => {
                const card = document.createElement('div');
                card.className = 'timetable-card';
                card.id = `card-${index}`;
                const totalsInfo = tt.totalslots ? ` | Slots: ${tt.totalslots} | Assigned: ${tt.assignedHours}` : '';
                // 🔥 NORMALIZE SCHEDULE
                tt._normalizedSchedule = normalizeSchedule(tt.schedule);
                console.log(`Normalized for ${tt.classId}:`, tt._normalizedSchedule);  // Debug: See P1-Mon etc.
                card.innerHTML = `
                    <div class="timetable-header">
                        <h3>Class: ${tt.classId} | Version: ${tt.version} | Generated: ${new Date(tt.generatedAt).toLocaleString()}${totalsInfo}</h3>
                        <div>
                            <button class="edit-btn" onclick="toggleEdit(${index})">Edit</button>
                            <button class="save-btn" id="save-${index}" onclick="saveLocal(${index})" disabled>Save Local</button>
                        </div>
                    </div>
                    <div id="table-${index}" class="table-container no-edit">
                        <!-- Initial read-only table -->
                    </div>
                    <p>Status: <span id="status-${index}" class="status saved">Saved ✅</span></p>
                `;
                container.appendChild(card);
                renderTimetableTableReadOnly(index, tt._normalizedSchedule, tt.workingDaysSorted || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']);
            });
        }

        // Toggle Edit
        function toggleEdit(index) {
            const tt = timetables[index];
            const tableDiv = document.getElementById(`table-${index}`);
            const isEditing = tableDiv.classList.contains('edit-mode');
            const editBtn = document.querySelector(`#card-${index} .edit-btn`);
            const saveBtn = document.getElementById(`save-${index}`);
            const status = document.getElementById(`status-${index}`);

            if (isEditing) {
                tableDiv.classList.remove('edit-mode');
                tableDiv.classList.add('no-edit');
                editBtn.textContent = 'Edit';
                saveBtn.disabled = true;
                status.textContent = 'Saved ✅';
                status.className = 'status saved';
                renderTimetableTableReadOnly(index, tt._normalizedSchedule, tt.workingDaysSorted || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']);
            } else {
                tableDiv.classList.remove('no-edit');
                tableDiv.classList.add('edit-mode');
                editBtn.textContent = 'Cancel';
                saveBtn.disabled = false;
                status.textContent = 'Editing...';
                status.className = 'status edited';
                renderTimetableTableEditable(index, tt._normalizedSchedule, tt.workingDaysSorted || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']);
            }
        }

        // Save Local
        function saveLocal(index) {
            const ttId = timetables[index]._id;
            editedMap[ttId] = true;
            toggleEdit(index);
            document.getElementById(`status-${index}`).textContent = 'Saved Locally ✅';
            updateButtonState();
        }

        // Read-Only Table Render (using normalized)
        function renderTimetableTableReadOnly(index, normalizedSchedule, days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']) {
            const tableDiv = document.getElementById(`table-${index}`);
            let tableHTML = `<table><thead><tr><th>Period (Time)</th>${days.map(d => `<th>${d}</th>`).join('')}</tr></thead><tbody>`;
            FIXED_PERIODS.forEach(period => {
                const timeLabel = `${period}<br><small>${PERIOD_TIMES[period]}</small>`;
                tableHTML += `<tr><td>${timeLabel}</td>`;
                days.forEach(day => {
                    const value = normalizedSchedule?.[period]?.[day] || '';
                    tableHTML += `<td class="read-only-cell">${value}</td>`;
                });
                tableHTML += '</tr>';
            });
            tableHTML += '</tbody></table>';
            tableDiv.innerHTML = tableHTML;
        }

        // Editable Table Render (using normalized)
        function renderTimetableTableEditable(index, normalizedSchedule, days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']) {
            const tableDiv = document.getElementById(`table-${index}`);
            let tableHTML = `<table><thead><tr><th>Period (Time)</th>${days.map(d => `<th>${d}</th>`).join('')}</tr></thead><tbody>`;
            FIXED_PERIODS.forEach(period => {
                const timeLabel = `${period}<br><small>${PERIOD_TIMES[period]}</small>`;
                tableHTML += `<tr><td>${timeLabel}</td>`;
                days.forEach(day => {
                    const value = normalizedSchedule?.[period]?.[day] || '';
                    tableHTML += `<td><input type="text" value="${value.replace(/"/g, '&quot;')}" onchange="handleCellChange(${index}, '${period}', '${day}', this.value)" /></td>`;
                });
                tableHTML += '</tr>';
            });
            tableHTML += '</tbody></table>';
            tableDiv.innerHTML = tableHTML;
        }

        // Cell Change (updates normalized, but saves raw for backend compat)
        function handleCellChange(index, period, day, newValue) {
            // Update normalized
            if (!timetables[index]._normalizedSchedule[period]) timetables[index]._normalizedSchedule[period] = {};
            timetables[index]._normalizedSchedule[period][day] = newValue;
            // Parse back to raw format for backend save (e.g., "Fri-P1": {subject, faculty})
            const [subject, faculty] = newValue.split('\n');
            const rawKey = `${day}-P${period.replace('P', '')}`;  // e.g., "Fri-P1"
            if (!timetables[index].schedule[rawKey]) timetables[index].schedule[rawKey] = {};
            timetables[index].schedule[rawKey] = { subject: subject || '', faculty: faculty || '' };
            const ttId = timetables[index]._id;
            if (!editedMap[ttId]) {
                editedMap[ttId] = true;
                updateButtonState();
            }
            console.log(`Updated ${period}-${day} to: ${newValue}`);
        }

        // Update Button State
        function updateButtonState() {
            const count = Object.keys(editedMap).length;
            updateBtn.disabled = count === 0;
            updateBtn.textContent = `Update All Timetables (${count} changes)`;
        }

        // Batch Update (sends raw schedule to backend)
        async function handleUpdateAll() {
            const count = Object.keys(editedMap).length;
            if (count === 0) return;
            updateBtn.textContent = 'Updating...';
            updateBtn.disabled = true;
            updateBtn.classList.add('loading');
            const updatedTimetables = timetables.filter(tt => editedMap[tt._id]).map(tt => ({
                ...tt,
                schedule: tt.schedule  // Send raw, not normalized
            }));
            try {
                const res = await fetch("http://localhost:8000/timetables/bulk-update", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(updatedTimetables)
                });
                console.log('Update response:', res.status, await res.text());
                if (!res.ok) throw new Error(await res.text());
                alert('Updated successfully! ✅');
                editedMap = {};
                updateButtonState();
                loadTimetables();  // Reload fresh
            } catch (err) {
                console.error('Update error:', err);
                alert('Update failed: ' + err.message);
            } finally {
                updateBtn.classList.remove('loading');
                updateBtn.textContent = 'Update All Timetables (0 changes)';
            }
        }

        // Publish Timetable Function

        async function publishTimetable(classId) {
  const res = await fetch("http://localhost:8000/timetables/publish", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ classId })
  });

  const data = await res.json();
  alert(data.message + " ✅");
}


        // Init
        updateBtn.addEventListener('click', handleUpdateAll);
        document.addEventListener('DOMContentLoaded', loadTimetables);
    </script>
</body>
