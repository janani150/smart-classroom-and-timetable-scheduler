    <style>

            font-family: 'Poppins', sans-serif;
            background: #f4f6fb;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h2 {
            color: #6c5ce7;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px 24px;
            background: #6c5ce7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #5a4fcf;
        }
        button.secondary {
            background: #636e72;
        }
        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle input[type="checkbox"] {
            width: auto;
        }
        #results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }
        .subjects-container {
            margin-top: 10px;
        }
        .subject-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .subject-input-group input {
            flex: 1;
        }
        .subject-input-group button {
            padding: 8px 12px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .subject-input-group button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

    <main class="main-content">
    <div class="container">
        <h2><i class="fas fa-cogs"></i> Timetable Rules Setup</h2>
        <form id="rulesForm">
            <div class="form-group">
                <label for="classId">Class</label>
                <select id="classId" required>
                    <option value="">Select Class</option>
                </select>
            </div>
            <div class="form-group">
                <label for="numSubjects">No. of Subjects</label>
                <input type="number" id="numSubjects" min="1" max="20" value="5" required>
                <div class="subjects-container" id="subjectsContainer"></div>
            </div>
            <div class="form-group">
                <label for="periodsPerDay">Periods per Day</label>
                <input type="number" id="periodsPerDay" min="1" max="10" value="6" required>
            </div>
            <div class="form-group">
                <label>Working Days</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="mon" value="Mon" checked>
                        <label for="mon">Mon</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="tue" value="Tue" checked>
                        <label for="tue">Tue</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="wed" value="Wed" checked>
                        <label for="wed">Wed</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="thu" value="Thu" checked>
                        <label for="thu">Thu</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="fri" value="Fri" checked>
                        <label for="fri">Fri</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="periodDuration">Period Duration (minutes)</label>
                <input type="number" id="periodDuration" value="60" min="30" max="120">
            </div>
            <div class="form-group">
                <label>Lunch Break</label>
                <div class="time-inputs">
                    <input type="time" id="lunchStart" value="12:30">
                    <input type="time" id="lunchEnd" value="13:30">
                </div>
            </div>
            <div class="form-group">
                <label for="maxSameSubjectPerDay">Max Same Subject per Day</label>
                <input type="number" id="maxSameSubjectPerDay" value="1" min="1" max="3">
            </div>
            <div class="form-group">
                <label class="toggle">
                    <input type="checkbox" id="noFacultyClash" checked>
                    No Faculty Clash Allowed
                </label>
            </div>
            <button type="submit">Save Rules</button>
        </form>
        <div id="results" style="display: none;">
    <h3>Saved Rules</h3>
    <pre id="rulesPreview"></pre>

    <button class="secondary" onclick="editRules()">
        <i class="fas fa-edit"></i> Edit
    </button>

    <button style="background:#e74c3c" onclick="deleteRules()">
        <i class="fas fa-trash"></i> Delete
    </button>
</div>

<div id="allRules" style="margin-top:40px;">
    <h3>All Saved Timetable Rules</h3>
    <div id="rulesList"></div>
</div>


    </div>

    </main>

    <script>
        const API = "http://127.0.0.1:8000";
        const form = document.getElementById('rulesForm');
        const classSelect = document.getElementById('classId');
        const numSubjectsInput = document.getElementById('numSubjects');
        const subjectsContainer = document.getElementById('subjectsContainer');
        const resultsDiv = document.getElementById('results');
        const preview = document.getElementById('rulesPreview');

        let currentSubjectInputs = [];

        // Function to generate subject input fields
        function generateSubjectInputs(num) {
            // Clear existing inputs
            subjectsContainer.innerHTML = '';
            currentSubjectInputs = [];

            for (let i = 0; i < num; i++) {
                const group = document.createElement('div');
                group.className = 'subject-input-group';
                group.innerHTML = `
                    <input type="text" placeholder="Subject ${i + 1} Name" required>
                    <button type="button" onclick="removeSubjectInput(this)">Remove</button>
                `;
                subjectsContainer.appendChild(group);
                currentSubjectInputs.push(group.querySelector('input'));
            }
        }

        // Function to remove a subject input
        window.removeSubjectInput = function(button) {
            button.parentElement.remove();
            // Re-index placeholders if needed, but for simplicity, we keep as is
        };

        // Event listener for number of subjects change
        numSubjectsInput.addEventListener('change', (e) => {
            const num = parseInt(e.target.value);
            if (num > 0) {
                generateSubjectInputs(num);
            }
        });

        // Initial generation
        generateSubjectInputs(5); // Default to 5

        // Load classes for dropdown
        async function loadClasses() {
            const res = await fetch(`${API}/classes`);
            const classes = await res.json();
            classSelect.innerHTML = '<option value="">Select Class</option>';
            classes.forEach(cls => {
                const opt = document.createElement('option');
                opt.value = cls.classId;
                opt.textContent = cls.classId;
                classSelect.appendChild(opt);
            });
        }

        // Collect working days
        function getWorkingDays() {
            const days = [];
            ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(day => {
                const chk = document.getElementById(day);
                if (chk.checked) days.push(chk.value);
            });
            return days;
        }

        // Collect subjects
        function getSubjects() {
            return currentSubjectInputs.map(input => input.value.trim()).filter(name => name !== '');
        }

        // Load existing rules on class change
        classSelect.addEventListener('change', async (e) => {
            const classId = e.target.value;
            if (!classId) return;
            const res = await fetch(`${API}/timetable-rules/${classId}`);
            if (res.ok) {
                const rules = await res.json();
                if (rules.periodsPerDay) document.getElementById('periodsPerDay').value = rules.periodsPerDay;
                if (rules.periodDuration) document.getElementById('periodDuration').value = rules.periodDuration;
                if (rules.lunchBreak) {
                    document.getElementById('lunchStart').value = rules.lunchBreak.start;
                    document.getElementById('lunchEnd').value = rules.lunchBreak.end;
                }
                if (rules.maxSameSubjectPerDay) document.getElementById('maxSameSubjectPerDay').value = rules.maxSameSubjectPerDay;
                if (rules.noFacultyClash !== undefined) document.getElementById('noFacultyClash').checked = rules.noFacultyClash;
                // Set checkboxes
                if (rules.workingDays) {
                    ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(day => {
                        document.getElementById(day).checked = rules.workingDays.includes(document.getElementById(day).value);
                    });
                }
                // Load subjects
                if (rules.subjects) {
                    document.getElementById('numSubjects').value = rules.subjects.length;
                    generateSubjectInputs(rules.subjects.length);
                    rules.subjects.forEach((subject, index) => {
                        if (currentSubjectInputs[index]) {
                            currentSubjectInputs[index].value = subject;
                        }
                    });
                }
                preview.textContent = JSON.stringify(rules, null, 2);
                resultsDiv.style.display = 'block';
            }
        });

        // Save on submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const classId = classSelect.value;
            if (!classId) {
                alert("Select a class first");
                return;
            }
            const subjects = getSubjects();
            if (subjects.length !== parseInt(numSubjectsInput.value)) {
                alert("Please fill all subject names");
                return;
            }
            const data = {
                classId,
                numSubjects: parseInt(numSubjectsInput.value),
                subjects: subjects,
                periodsPerDay: parseInt(document.getElementById('periodsPerDay').value),
                workingDays: getWorkingDays(),
                periodDuration: parseInt(document.getElementById('periodDuration').value),
                lunchBreak: {
                    start: document.getElementById('lunchStart').value,
                    end: document.getElementById('lunchEnd').value
                },
                maxSameSubjectPerDay: parseInt(document.getElementById('maxSameSubjectPerDay').value),
                noFacultyClash: document.getElementById('noFacultyClash').checked
            };
            const res = await fetch(`${API}/timetable-rules`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data),
            });
            if (res.ok) {
                alert("Rules saved!");
                preview.textContent = JSON.stringify(data, null, 2);
                resultsDiv.style.display = 'block';
                loadAllRules(); // Refresh the list after save
            } else {
                alert("Failed to save: " + await res.text());
            }
        });

        function editRules() {
    alert("Edit the form values and click Save Rules");
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteRules() {
    const classId = classSelect.value;
    if (!classId) return;

    if (!confirm("Are you sure you want to delete these rules?")) return;

    const res = await fetch(`${API}/timetable-rules/${classId}`, {
        method: "DELETE"
    });

    if (res.ok) {
        alert("Rules deleted!");
        resultsDiv.style.display = "none";
        form.reset();
        classSelect.value = "";
        subjectsContainer.innerHTML = "";
        currentSubjectInputs = [];
        loadAllRules(); // Refresh the list after delete
    } else {
        alert("Failed to delete rules");
    }
}

async function loadRuleForEdit(classId) {
    classSelect.value = classId;
    classSelect.dispatchEvent(new Event("change"));
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deleteRule(classId) {
    if (!confirm(`Delete rules for ${classId}?`)) return;

    const res = await fetch(`${API}/timetable-rules/${classId}`, {
        method: "DELETE"
    });

    if (res.ok) {
        alert("Deleted!");
        loadAllRules();
    } else {
        alert("Delete failed");
    }
}

const rulesList = document.getElementById("rulesList");

async function loadAllRules() {
    const res = await fetch(`${API}/timetable-rules`);
    const rules = await res.json();

    rulesList.innerHTML = "";

    if (rules.length === 0) {
        rulesList.innerHTML = "<p>No rules created yet</p>";
        return;
    }

    rules.forEach(rule => {
        const card = document.createElement("div");
        card.style.cssText = `
            background:#fff;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
            margin-bottom:20px;
        `;

        card.innerHTML = `
            <h4>Class: ${rule.classId}</h4>
            <pre>${JSON.stringify(rule, null, 2)}</pre>

            <button onclick="loadRuleForEdit('${rule.classId}')">
                ✏️ Edit
            </button>
            <button style="background:#e74c3c;color:#fff"
                onclick="deleteRule('${rule.classId}')">
                🗑 Delete
            </button>
        `;

        rulesList.appendChild(card);
    });
}

        // Init
        loadClasses();
        loadAllRules();
    </script>
</body>
