</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-graduate"></i>
            <span>Student Dashboard</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>

    <main class="main-content">
        <header class="page-header">
            <h1>Slot Change Requests</h1>
            <p>Request schedule adjustments.</p>
        </header>
        <div class="container">
            <form class="request-form">
                <div class="form-group">
                    <label for="current-slot">Current Slot</label>
                    <select id="current-slot" class="form-select">
                        <option>Math 10:00 AM</option>
                        <!-- Options -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="new-slot">Preferred New Slot</label>
                    <select id="new-slot" class="form-select">
                        <option>Physics 11:00 AM</option>
                        <!-- Options -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="reason">Reason</label>
                    <textarea id="reason" placeholder="Explain your request"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit Request</button>
            </form>
        </div>
    </main>
    <script src="C:\Users\Janan\OneDrive\Desktop\vac sih project\smart-classroom-frontend\js\shared.js"></script>
    <script>
        document.querySelector('.request-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Request submitted!');
        });
    </script>
</body>
